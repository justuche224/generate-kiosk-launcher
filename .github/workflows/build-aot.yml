name: Build Native AOT Launcher and Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish Win-x64
        run: dotnet publish -r win-x64 -c Release -o ./dist

      - name: Build Installer with Inno Setup
        # This uses the pre-installed Inno Setup compiler on the GitHub runner
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Setup EXE
        uses: actions/upload-artifact@v4
        with:
          name: Pine-POS-Installer
          # The .iss script saves the final installer in the Output folder
          path: ./Output/PinePOSSetup.exe